  - name: content_sections
    label: Section Collections
    type: group
    items:
      - name: html_posts
        label: Published HTML Posts
        type: collection
        path: posts
        format: code
        subfolders: true
        operations:
          create: false
          rename: false
          delete: false
        view:
          layout: tree
          node:
            filename: index.html
            hideDirs: others
      - name: guides
        label: Guides
        type: collection
        path: guides
        format: code
        subfolders: true
        operations:
          create: false
          rename: false
          delete: false
        view:
          layout: tree
          node:
            filename: index.html
            hideDirs: others
      - name: survival_shit
        label: Survival Shit
        type: collection
        path: survival-shit
        format: code
        subfolders: true
        operations:
          create: false
          rename: false
          delete: false
        view:
          layout: tree
          node:
            filename: index.html
            hideDirs: others
      - name: freebies
        label: Freebies
        type: collection
        path: freebies
        format: code
        subfolders: true
        operations:
          create: false
          rename: false
          delete: false
        view:
          layout: tree
          node:
            filename: index.html
            hideDirs: others
      - name: categories
        label: Category Pages
        type: collection
        path: category
        format: code
        subfolders: true
        operations:
          create: false
          rename: false
          delete: false
        view:
          layout: tree
          node:
            filename: index.html
            hideDirs: others

  - name: design_and_support
    label: Design + Support Files
    type: group
    items:
      - name: stylesheet
        label: Main Stylesheet
        type: file
        path: css/style.css
        format: code
        operations: { delete: false }
      - name: site_shell_js
        label: Site Shell JavaScript
        type: file
        path: js/site-shell.js
        format: code
        operations: { delete: false }
      - name: site_config_js
        label: Site Config JavaScript
        type: file
        path: js/site-config.js
        format: code
        operations: { delete: false }
      - name: progressier_js
        label: Progressier JavaScript
        type: file
        path: progressier.js
        format: code
        operations: { delete: false }
      - name: design_notes
        label: Design Notes
        type: file
        path: DESIGN.md
        fields:
          - name: body
            label: Content
            type: rich-text
            options:
              format: markdown
              media: assets_images
              switcher: true
      - name: readme
        label: README
        type: file
        path: README.md
        fields:
          - name: body
            label: Content
            type: rich-text
            options:
              format: markdown
              media: assets_images
              switcher: true
      - name: gitcms_notes
        label: Legacy GitCMS Notes
        type: file
        path: gitcms.md
        fields:
          - name: body
            label: Content
            type: rich-text
            options:
              format: markdown
              media: assets_images
              switcher: true

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path} via Pages CMS"
      update: "content(update): {path} via Pages CMS"
      delete: "content(delete): {path} via Pages CMS"
      rename: "content(rename): {oldPath} -> {newPath} via Pages CMS"
