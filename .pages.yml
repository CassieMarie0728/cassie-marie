# Pages CMS configuration for CassieMarie0728/cassie-marie
# Repo shape: static HTML pages + Jekyll/GitHub Pages build.
# Note: _posts/ is intentionally not exposed here because that rogue Markdown post is being relocated.

media:
  - name: assets_images
    label: Assets Images
    input: assets/images
    output: /assets/images
    categories: [image]
    rename: safe
  - name: site_images
    label: Site Images
    input: images
    output: /images
    categories: [image]
    rename: safe

content:
  - name: core_files
    label: Core Site Files
    type: group
    items:
      - name: homepage
        label: Homepage
        type: file
        path: index.html
        format: code
        operations: { delete: false }
      - name: not_found
        label: 404 Page
        type: file
        path: 404.html
        format: code
        operations: { delete: false }
      - name: site_config
        label: Jekyll Config
        type: file
        path: _config.yml
        fields:
          - name: title
            label: Site Title
            type: string
            required: true
          - name: timezone
            label: Timezone
            type: string
            required: true
          - name: collections
            label: Collections
            type: object
            required: false
            fields:
              - name: posts
                label: Posts Collection
                type: object
                required: false
                fields:
                  - name: title
                    label: Title
                    type: string
                    required: false
                  - name: output
                    label: Output
                    type: boolean
                    required: false
              - name: uploads
                label: Uploads Collection
                type: object
                required: false
                fields:
                  - name: title
                    label: Title
                    type: string
                    required: false
                  - name: output
                    label: Output
                    type: boolean
                    required: false
      - name: cname
        label: Custom Domain / CNAME
        type: file
        path: CNAME
        format: code
        operations: { delete: false }
      - name: robots
        label: Robots.txt
        type: file
        path: robots.txt
        format: code
      - name: sitemap
        label: Sitemap.xml
        type: file
        path: sitemap.xml
        format: code
      - name: rss
        label: RSS Feed
        type: file
        path: rss.xml
        format: code

  - name: main_pages
    label: Main HTML Pages
    type: group
    items:
      - name: about_the_broad
